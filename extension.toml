id = "godot-enhanced"
name = "Godot Enhanced"
version = "1.0.0"
schema_version = 1
authors = ["Julian Seidel <jseidel@example.com>"]
description = "Enhanced Godot game engine support for Zed. Complete support for GDScript with LSP, GDShader, and Godot Resources (.tres, .tscn). Based on GDQuest's extension with additional features and validations."
repository = "https://github.com/jseidel/zed-godot-enhanced"
homepage = "https://github.com/jseidel/zed-godot-enhanced"

[grammars.gdscript]
repository = "https://github.com/PrestonKnopp/tree-sitter-gdscript"
commit = "0b9f60ebaa1c31f5153dd3a3b283ca0725734378"

[grammars.godot_resource]
repository = "https://github.com/PrestonKnopp/tree-sitter-godot-resource"
commit = "2ffb90de47417018651fc3b970e5f6b67214dc9d"

[grammars.gdshader]
repository = "https://github.com/GodOfAvacyn/tree-sitter-gdshader"
commit = "ffd9f958df13cae04593781d7d2562295a872455"
